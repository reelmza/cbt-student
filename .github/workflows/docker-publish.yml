name: Build & Push Student App

on:
  workflow_dispatch:
    inputs:
      is_local:
        description: "NEXT_PUBLIC_ISLOCAL value baked into the build (1 = local exam-hall, 0 = production)"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ISLOCAL=${{ github.event.inputs.is_local }}
          tags: ghcr.io/oaystech/cbt-student:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
